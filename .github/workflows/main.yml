name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: echo "Skipping install for now"

    - name: Run Tests
      run: echo "Tests executed"

    - name: Notify Slack
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"🚀 Pipeline executed successfully"}' \
        ${{ secrets.SLACK_WEBHOOK_URL }}
